name: Python CI

on:
  push:
     branches: [ "main ]

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar script
        run: python app.py

