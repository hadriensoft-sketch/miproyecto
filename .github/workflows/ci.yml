name: Docker CI

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: action/checkout@v3

      - name: Construir imagen Docker
        run: docker build -t mi-app .

      - name: Ejecutar contenedor
        run: docker run mi-app

